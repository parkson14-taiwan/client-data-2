const INQUIRY_SOURCE_OPTIONS = [
  { value: 'shiok', label: 'Shiok' },
  { value: 'chef_de_masion', label: 'Chef De Masion' },

  { value: 'pearl_coast', label: 'Pearl Coast' },

const STATUS_COLORS = {
  new: 'bg-cyan-500 text-white',
  confirmed: 'bg-green-500 text-white',
  in_progress: 'bg-blue-500 text-white',
  finished_event: 'bg-teal-600 text-white',
  no_response: 'bg-yellow-500 text-black',
  canceled: 'bg-red-500 text-white',
  price_issue: 'bg-orange-500 text-white',
  found_other_vendor: 'bg-purple-500 text-white',
  postponed: 'bg-gray-500 text-white',
  other_reason: 'bg-indigo-500 text-white',
  default: 'bg-gray-400 text-white',
};

const getStatusLabel = (value) => {
    const option = STATUS_OPTIONS.find(o => o.value === value);
    return option ? option.label : 'Unknown';
};

const getInquirySourceLabel = (value) => {
    const option = INQUIRY_SOURCE_OPTIONS.find(o => o.value === value);
    return option ? option.label : 'N/A';
};

// Icons (same as user's code)

function App() {
  const [db, setDb] = React.useState(null);
  const [isReady, setIsReady] = React.useState(false);
  const [view, setView] = React.useState('loading');
  const [customers, setCustomers] = React.useState([]);
  const [selectedCustomerId, setSelectedCustomerId] = React.useState(null);
  const [searchTerm, setSearchTerm] = React.useState('');
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    const initializeFirebaseApp = async () => {
      try {
        const app = initializeApp(firebaseConfig);
        const firestoreDb = getFirestore(app);
        const auth = getAuth(app);
        await setPersistence(auth, browserLocalPersistence);
        if (!auth.currentUser) await signInAnonymously(auth);
        setDb(firestoreDb);
        setIsReady(true);
        setView('list');
      } catch (e) {
        console.error("Firebase Initialization Error:", e);
        setError("Application initialization failed.");
        setView('error');
      }
    };
    initializeFirebaseApp();
  }, []);

  React.useEffect(() => {
    if (!isReady || !db) return;
    const customersCollectionPath = `artifacts/${appId}/public/data/customers`;
    const qref = query(collection(db, customersCollectionPath));
    const unsubscribe = onSnapshot(qref, (querySnapshot) => {
      const customersData = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      setCustomers(customersData);
    }, (err) => {
      console.error("Error fetching customers:", err);
      setError("An error occurred while fetching customer data.");
    });
    return () => unsubscribe();
  }, [isReady, db]);

  const navigateTo = (viewName, customerId = null) => {
    setSelectedCustomerId(customerId);
    setView(viewName);
  };

  const sortedCustomers = React.useMemo(() => {
    return [...customers].sort((a, b) => {
      const getLatestEventDate = (c) => c.events && c.events.length > 0 ? new Date(c.events.sort((evA, evB) => new Date(evB.eventDate) - new Date(evA.eventDate))[0].eventDate) : (c.createdAt?.seconds ? new Date(c.createdAt.seconds * 1000) : new Date(0));
      return getLatestEventDate(b) - getLatestEventDate(a);
    });
  }, [customers]);

  const filteredCustomers = React.useMemo(() => {
    return sortedCustomers.filter(customer => {
      const lowercasedSearchTerm = searchTerm.toLowerCase();
      const searchMatch = (
        (customer.name && customer.name.toLowerCase().includes(lowercasedSearchTerm)) ||
        (customer.phone && customer.phone.includes(searchTerm)) ||
        (customer.address && customer.address.toLowerCase().includes(lowercasedSearchTerm)) ||
        (customer.events && customer.events.some(event => (event.refNo || '').toLowerCase().includes(lowercasedSearchTerm)))
      );
      const statusMatch = statusFilter === 'all' || customer.status === statusFilter;
      return searchMatch && statusMatch;
    });
  }, [sortedCustomers, searchTerm, statusFilter]);

  const handleExportAll = () => {
    let csvContent = "data:text/csv;charset=utf-8,";
    const headers = ["Customer Name", "Phone", "Address", "Customer Status", "Event Date", "Ref No", "Inquiry Source", "Inquiry Date (Logged At)", "Event Price"];
    csvContent += headers.join(",") + "\r\n";

    sortedCustomers.forEach(customer => {
      if (customer.events && customer.events.length > 0) {
        customer.events.forEach(event => {
          const row = [
            `"${customer.name || ''}"`,
            `"${customer.phone || ''}"`,
            `"${(customer.address || '').replace(/"/g, '""')}"`,
            `"${getStatusLabel(customer.status)}"`,
            `"${event.eventDate || ''}"`,
            `"${event.refNo || ''}"`,
            `"${getInquirySourceLabel(event.inquirySource)}"`,
            `"${event.loggedAt?.toDate ? event.loggedAt.toDate().toLocaleDateString('en-CA') : ''}"`,
            `${event.eventPrice || 0}`
          ].join(",");
          csvContent += row + "\r\n";
        });
      } else {
        const row = [
          `"${customer.name || ''}"`,
          `"${customer.phone || ''}"`,
          `"${(customer.address || '').replace(/"/g, '""')}"`,
          `"${getStatusLabel(customer.status)}"`,
          "", "", "", "", ""
        ].join(",");
        csvContent += row + "\r\n";
      }
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "full_customer_database.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const renderContent = () => {
    switch (view) {
      case 'loading': return <div className="text-center p-10">Loading...</div>;
      case 'error': return <div className="text-center p-10 text-red-400">{error}</div>;
      case 'add': return <AddCustomerForm db={db} onBack={() => navigateTo('list')} />;
      case 'detail': return <CustomerDetail db={db} customerId={selectedCustomerId} onBack={() => navigateTo('list')} />;
      case 'dashboard': return <AnalyticsDashboard customers={customers} navigateTo={navigateTo} />;
      case 'list':
      default:
        return (
          <div>
            <div className="p-4 bg-gray-800 border-b border-gray-700 flex flex-col sm:flex-row items-center gap-4">
              <div className="relative flex-grow w-full sm:w-auto">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><SearchIcon /></span>
                <input type="text" placeholder="Search by name, phone, address, or Ref No..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg py-2 pl-12 pr-4"/>
              </div>
              <div className="relative w-full sm:w-auto">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"><FilterIcon /></span>
                <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="w-full appearance-none bg-gray-700 border border-gray-600 rounded-lg py-2 pl-10 pr-8">
                  <option value="all">All Statuses</option>
                  {STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
                </select>
              </div>
              <button onClick={handleExportAll} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg"><DownloadIcon /><span>Export All</span></button>
              <button onClick={() => navigateTo('add')} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg"><UserPlusIcon /><span>Add Customer</span></button>
            </div>
            <CustomerList customers={filteredCustomers} onSelectCustomer={(id) => navigateTo('detail', id)} />
          </div>
        );
    }
  };

  return (
    <div className="bg-gray-900 text-white min-h-screen font-sans">
      <header className="bg-gray-800/50 backdrop-blur-sm shadow-md sticky top-0 z-10">
        <div className="container mx-auto px-4 py-3 flex justify-between items-center">
          <h1 className="text-2xl font-bold">Customer Relationship Management</h1>
          <button onClick={() => setView(view === 'dashboard' ? 'list' : 'dashboard')} className="flex items-center gap-2 text-blue-400 hover:text-blue-300">
            {view === 'dashboard' ? <ArrowLeftIcon /> : <ChartIcon />}
            {view === 'dashboard' ? 'Back to List' : 'Analytics'}
          </button>
        </div>
      </header>
      <main className="container mx-auto p-4">{renderContent()}</main>
    </div>
  );
}

function CustomerList({ customers, onSelectCustomer }) {
  if (customers.length === 0) return <p className="text-center text-gray-400 mt-8">No customers match the current filter.</p>;
  return (
    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">
      {customers.map(customer => (
        <div key={customer.id} onClick={() => onSelectCustomer(customer.id)} className="bg-gray-800 rounded-lg p-4 cursor-pointer hover:bg-gray-700 hover:shadow-lg transition-all transform hover:-translate-y-1">
          <div className="flex justify-between items-start">
            <h3 className="text-xl font-semibold text-blue-400">{customer.name}</h3>
            <span className={`px-2 py-1 text-xs font-bold rounded-full ${STATUS_COLORS[customer.status] || STATUS_COLORS.default}`}>{getStatusLabel(customer.status)}</span>
          </div>
          <div className="text-gray-300 mt-2 space-y-1">
            <p className="flex items-center gap-2"><PhoneIcon /> {customer.phone}</p>
            <p className="flex items-center gap-2"><HomeIcon /> {customer.address || 'No address provided'}</p>
          </div>
        </div>
      ))}
    </div>
  );
}

function AddCustomerForm({ db, onBack }) {
  const [name, setName] = React.useState('');
  const [phone, setPhone] = React.useState('');
  const [address, setAddress] = React.useState('');
  const [status, setStatus] = React.useState('new');
  const [eventDate, setEventDate] = React.useState('');
  const [refNo, setRefNo] = React.useState('');
  const [inquirySource, setInquirySource] = React.useState('other');
  const [eventPrice, setEventPrice] = React.useState('');
  const [isSaving, setIsSaving] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!name || !phone || isSaving) return;
    setIsSaving(true);
    try {
      const customersCollectionPath = `artifacts/${appId}/public/data/customers`;
      await addDoc(collection(db, customersCollectionPath), {
        name, phone, address, status,
        events: eventDate && refNo ? [{ eventDate, refNo, inquirySource, eventPrice: parseFloat(eventPrice) || 0, loggedAt: Timestamp.now() }] : [],
        createdAt: Timestamp.now()
      });
      onBack();
    } catch (error) {
      console.error("Error adding customer:", error);
      const msg = [
        'Failed to add customer.',
        error?.code ? `code: ${error.code}` : '',
        error?.message ? `message: ${error.message}` : ''
      ].filter(Boolean).join('\n');
      alert(msg);
    } finally { setIsSaving(false); }
  };

  return (
    <div className="max-w-2xl mx-auto bg-gray-800 p-6 rounded-lg shadow-xl">
      <div className="flex items-center mb-6">
        <button onClick={onBack} className="mr-4 p-2 rounded-full hover:bg-gray-700 transition"><ArrowLeftIcon /></button>
        <h2 className="text-2xl font-bold">Add New Customer</h2>
      </div>
      <form onSubmit={handleSubmit} className="space-y-4">
        <div>
          <label htmlFor="name" className="block text-sm font-medium text-gray-300 mb-1">Name</label>
          <input type="text" id="name" value={name} onChange={(e) => setName(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div>
          <label htmlFor="phone" className="block text-sm font-medium text-gray-300 mb-1">Phone</label>
          <input type="tel" id="phone" value={phone} onChange={(e) => setPhone(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div>
          <label htmlFor="address" className="block text-sm font-medium text-gray-300 mb-1">Address</label>
          <input type="text" id="address" value={address} onChange={(e) => setAddress(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div className="p-4 border border-gray-700 rounded-lg space-y-4">
          <p className="text-sm text-gray-400">Optional: Add first event details</p>
          <div>
            <label htmlFor="eventDate" className="block text-sm font-medium text-gray-300 mb-1">Event Date</label>
            <input type="date" id="eventDate" value={eventDate} onChange={(e) => setEventDate(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
          </div>
          <div>
            <label htmlFor="refNo" className="block text-sm font-medium text-gray-300 mb-1">Ref No.</label>
            <input type="text" id="refNo" value={refNo} onChange={(e) => setRefNo(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
          </div>
          <div>
            <label htmlFor="eventPrice" className="block text-sm font-medium text-gray-300 mb-1">Event Price</label>
            <input type="number" id="eventPrice" value={eventPrice} onChange={(e) => setEventPrice(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
          </div>
          <div>
            <label htmlFor="inquirySource" className="block text-sm font-medium text-gray-300 mb-1">Inquiry Source</label>
            <select id="inquirySource" value={inquirySource} onChange={(e) => setInquirySource(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2">
              {INQUIRY_SOURCE_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label htmlFor="status" className="block text-sm font-medium text-gray-300 mb-1">Status</label>
          <select id="status" value={status} onChange={(e) => setStatus(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2">
            {STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
          </select>
        </div>
        <div className="flex justify-end">
          <button type="submit" disabled={isSaving} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition disabled:bg-gray-500">{isSaving ? 'Saving...' : 'Save Customer'}</button>
        </div>
      </form>
    </div>
  );
}

function CustomerDetail({ db, customerId, onBack }) {
  const [customer, setCustomer] = React.useState(null);
  const [logs, setLogs] = React.useState([]);
  const [isLoading, setIsLoading] = React.useState(true);
  const [showNewEventForm, setShowNewEventForm] = React.useState(false);
  const [editingEventIndex, setEditingEventIndex] = React.useState(null);
  const [isEditingInfo, setIsEditingInfo] = React.useState(false);
  const [editableInfo, setEditableInfo] = React.useState({ name: '', phone: '', address: '' });

  const customerDocPath = React.useMemo(() => `artifacts/${appId}/public/data/customers/${customerId}`, [customerId]);

  React.useEffect(() => {
    if (!db) return;
    const unsub = onSnapshot(doc(db, customerDocPath), (docSnap) => {
      if (docSnap.exists()) {
        const data = { id: docSnap.id, ...docSnap.data() };
        setCustomer(data);
        setEditableInfo({ name: data.name, phone: data.phone, address: data.address || '' });
      } else { setCustomer(null); }
      setIsLoading(false);
    });
    return () => unsub();
  }, [db, customerDocPath]);

  React.useEffect(() => {
    if (!db) return;
    const logsCollectionPath = `${customerDocPath}/logs`;
    const qref = query(collection(db, logsCollectionPath));
    const unsub = onSnapshot(qref, (snapshot) => setLogs(snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.createdAt.toDate() - a.createdAt.toDate())));
    return () => unsub();
  }, [db, customerDocPath]);

  const handleInfoChange = (e) => setEditableInfo({ ...editableInfo, [e.target.name]: e.target.value });
  const handleUpdateInfo = async () => {
    if (!editableInfo.name || !editableInfo.phone) return alert("Name and Phone are required.");
    await updateDoc(doc(db, customerDocPath), editableInfo);
    setIsEditingInfo(false);
  };
  const handleStatusChange = async (newStatus) => await updateDoc(doc(db, customerDocPath), { status: newStatus }).catch(err => alert("Failed to update status."));

  if (isLoading) return <div className="text-center p-10">Loading customer details...</div>;
  if (!customer) return <div className="text-center p-10">Customer data not found.</div>;

  const sortedEvents = customer.events ? [...customer.events].sort((a, b) => new Date(b.eventDate) - new Date(a.eventDate)) : [];

  return (
    <div className="max-w-4xl mx-auto">
      <div className="flex items-center mb-6">
        <button onClick={onBack} className="mr-4 p-2 rounded-full hover:bg-gray-700 transition"><ArrowLeftIcon /></button>
        <h2 className="text-3xl font-bold text-blue-400">{isEditingInfo ? editableInfo.name : customer.name}</h2>
      </div>
      <div className="bg-gray-800 p-6 rounded-lg shadow-lg mb-6">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-xl font-semibold">Basic Information</h3>
          {!isEditingInfo ? (
            <button onClick={() => setIsEditingInfo(true)} className="flex items-center gap-2 text-blue-400 hover:text-blue-300"><EditIcon /> Edit</button>
          ) : (
            <div className="flex gap-2">
              <button onClick={() => setIsEditingInfo(false)} className="bg-gray-600 hover:bg-gray-500 text-white font-bold py-1 px-3 rounded-lg">Cancel</button>
              <button onClick={handleUpdateInfo} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded-lg">Save</button>
            </div>
          )}
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-gray-300">
          {isEditingInfo ? (
            <>
              <div className="flex items-center gap-3"><UserIcon /><input type="text" name="name" value={editableInfo.name} onChange={handleInfoChange} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
              <div className="flex items-center gap-3"><PhoneIcon /><input type="text" name="phone" value={editableInfo.phone} onChange={handleInfoChange} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
              <div className="sm:col-span-2 flex items-center gap-3"><HomeIcon /><input type="text" name="address" value={editableInfo.address} onChange={handleInfoChange} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
            </>
          ) : (
            <>
              <p className="flex items-center gap-3"><PhoneIcon /> <span>{customer.phone}</span></p>
              <p className="flex items-center gap-3"><HomeIcon /> <span>{customer.address || 'No address provided'}</span></p>
            </>
          )}
          <p className="flex items-center gap-3"><CalendarIcon /> <span>Member Since: {customer.createdAt?.toDate ? customer.createdAt.toDate().toLocaleDateString() : ''}</span></p>
          <div className="sm:col-span-2 flex items-center gap-3"><TagIcon /><select value={customer.status || 'new'} onChange={(e) => handleStatusChange(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-lg p-2 w-full">{STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}</select></div>
        </div>
      </div>
      <div className="bg-gray-800 p-6 rounded-lg shadow-lg mb-6">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-xl font-semibold">Event History</h3>
          <button onClick={() => setShowNewEventForm(!showNewEventForm)} className="flex items-center gap-2 text-blue-400 hover:text-blue-300"><PlusCircleIcon /> {showNewEventForm ? 'Cancel' : 'Log New Event'}</button>
        </div>
        {showNewEventForm && <EventForm db={db} customerDocPath={customerDocPath} onComplete={() => setShowNewEventForm(false)} />}
        <div className="space-y-4 mt-4">
          {sortedEvents.map((event, index) => (
            <div key={index}>
              {editingEventIndex === index ? (
                <EventForm db={db} customer={customer} event={event} eventIndex={index} customerDocPath={customerDocPath} onComplete={() => setEditingEventIndex(null)} />
              ) : (
                <div className="p-3 bg-gray-900/50 rounded-lg">
                  <div className="flex justify-between items-start">
                    <div className="flex-grow">
                      <span className="font-semibold text-white">{event.refNo} - ${event.eventPrice?.toFixed ? event.eventPrice.toFixed(2) : Number(event.eventPrice || 0).toFixed(2)}</span>
                      <div className="text-sm text-gray-400">
                        <span>Event: {event.eventDate}</span>
                        <span className="mx-2">|</span>
                        <span>Inquiry: {event.loggedAt?.toDate ? event.loggedAt.toDate().toLocaleDateString('en-CA') : ''}</span>
                        <span className="mx-2">|</span>
                        <span>Source: {getInquirySourceLabel(event.inquirySource)}</span>
                      </div>
                    </div>
                    <button onClick={() => setEditingEventIndex(index)} className="text-blue-400 hover:text-blue-300 text-sm flex items-center gap-1"><EditIcon/> Edit</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      <LogEntryForm db={db} customerDocPath={customerDocPath} />
      <HistoryList logs={logs} />
    </div>
  );
}

function EventForm({ db, customer, event, eventIndex, customerDocPath, onComplete }) {
  const isEditing = event !== undefined;
  const [eventDate, setEventDate] = React.useState(isEditing ? event.eventDate : '');
  const [refNo, setRefNo] = React.useState(isEditing ? event.refNo : '');
  const [inquirySource, setInquirySource] = React.useState(isEditing ? event.inquirySource || 'other' : 'other');
  const [eventPrice, setEventPrice] = React.useState(isEditing ? event.eventPrice || '' : '');
  const [isSaving, setIsSaving] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!eventDate || !refNo || isSaving) return;
    setIsSaving(true);
    const eventData = { eventDate, refNo, inquirySource, eventPrice: parseFloat(eventPrice) || 0, loggedAt: isEditing ? event.loggedAt : Timestamp.now() };
    try {
      if (isEditing) {
        const updatedEvents = [...customer.events];
        updatedEvents[eventIndex] = eventData;
        await updateDoc(doc(db, customerDocPath), { events: updatedEvents });
      } else {
        await updateDoc(doc(db, customerDocPath), { events: arrayUnion(eventData) });
      }
      onComplete();
    } catch (error) {
      console.error("Error saving event:", error);
      alert("Failed to save event.");
    } finally { setIsSaving(false); }
  };

  return (
    <form onSubmit={handleSubmit} className="p-4 bg-gray-900/50 rounded-lg space-y-4 border border-blue-500/50">
      <h4 className="font-bold text-lg">{isEditing ? 'Edit Event' : 'Log New Event'}</h4>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">{isEditing ? 'Event Date' : 'New Event Date'}</label><input type="date" value={eventDate} onChange={e => setEventDate(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">{isEditing ? 'Ref No.' : 'New Ref No.'}</label><input type="text" value={refNo} onChange={e => setRefNo(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">Event Price</label><input type="number" step="0.01" value={eventPrice} onChange={e => setEventPrice(e.target.value)} placeholder="0.00" className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">Inquiry Source</label><select value={inquirySource} onChange={e => setInquirySource(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2">{INQUIRY_SOURCE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
      <div className="flex justify-end gap-2"><button type="button" onClick={onComplete} className="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg">Cancel</button><button type="submit" disabled={isSaving} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg disabled:bg-gray-500">{isSaving ? 'Saving...' : 'Save Event'}</button></div>
    </form>
  );
}

function LogEntryForm({ db, customerDocPath }) {
  const [notes, setNotes] = React.useState('');
  const [menu, setMenu] = React.useState('');
  const handleAddLog = async (e) => {
    e.preventDefault();
    if (!notes.trim() && !menu.trim()) return;
    try {
      await addDoc(collection(db, `${customerDocPath}/logs`), { notes, menu, createdAt: Timestamp.now() });
      setNotes('');
      setMenu('');
    } catch (error) {
      console.error("Error adding log:", error);
      alert('Failed to add log.');
    }
  };
  return (
    <div className="bg-gray-800 p-6 rounded-lg shadow-lg mb-8">
      <h3 className="text-xl font-semibold mb-4">Add Interaction Log / Order</h3>
      <form onSubmit={handleAddLog} className="space-y-4">
        <div><label htmlFor="notes" className="block text-sm font-medium text-gray-300 mb-1">Interaction Notes</label><textarea id="notes" rows="4" value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Record conversation details..." className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"></textarea></div>
        <div><label htmlFor="menu" className="block text-sm font-medium text-gray-300 mb-1">Menu / Order Record</label><textarea id="menu" rows="3" value={menu} onChange={(e) => setMenu(e.target.value)} placeholder="Record items ordered..." className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"></textarea></div>
        <div className="text-right"><button type="submit" className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg">Add Log</button></div>
      </form>
    </div>
  );
}

function HistoryList({ logs }) {
  return (
    <div>
      <h3 className="text-2xl font-semibold mb-4">Interaction History</h3>
      <div className="space-y-6">
        {logs.length > 0 ? logs.map(log => (
          <div key={log.id} className="bg-gray-800 rounded-lg p-5 shadow-md border-l-4 border-blue-500">
            <p className="text-sm text-gray-400 mb-3 font-semibold flex items-center gap-2"><CalendarIcon /> {log.createdAt?.toDate ? log.createdAt.toDate().toLocaleString('en-US') : ''}</p>
            {log.notes && (<div className="mb-4"><h4 className="font-bold text-gray-200 mb-1">Notes:</h4><p className="text-gray-300 whitespace-pre-wrap">{log.notes}</p></div>)}
            {log.menu && (<div><h4 className="font-bold text-gray-200 mb-1 flex items-center gap-2"><BookOpenIcon /> Menu/Order:</h4><p className="text-gray-300 whitespace-pre-wrap bg-gray-700/50 p-3 rounded">{log.menu}</p></div>)}
          </div>
        )) : <p className="text-center text-gray-400 py-6">No interaction logs yet.</p>}
      </div>
    </div>
  );
}

function AnalyticsDashboard({ customers, navigateTo }) {
  const today = new Date();
  const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
  const [startDate, setStartDate] = React.useState(firstDayOfMonth);
  const [endDate, setEndDate] = React.useState(today.toISOString().split('T')[0]);
  const [analysisMode, setAnalysisMode] = React.useState('eventDate'); 

  const data = React.useMemo(() => {
    const start = new Date(startDate);
    const end = new Date(endDate);
    end.setHours(23, 59, 59, 999); 

    const monthRefNoMap = {
      0: 'J', 1: 'F', 2: 'M', 3: 'AL', 4: 'MY', 5: 'JN', 
      6: 'JY', 7: 'A', 8: 'S', 9: 'O', 10: 'N', 11: 'D'
    };

    const relevantEvents = [];
    customers.forEach(customer => {
      if (customer.events) {
        customer.events.forEach(event => {
          let includeEvent = false;
          if (analysisMode === 'eventDate') {
            const eventDate = new Date(event.eventDate);
            if (eventDate >= start && eventDate <= end) {
              includeEvent = true;
            }
          } else if (analysisMode === 'inquiryDate') {
            const loggedAtDate = event.loggedAt?.toDate ? event.loggedAt.toDate() : null;
            if (loggedAtDate && loggedAtDate >= start && loggedAtDate <= end) {
              includeEvent = true;
            }
          } else if (analysisMode === 'refNoMonth') {
            if (event.refNo) {
              const startMonth = start.getMonth();
              const prefix = monthRefNoMap[startMonth];
              if (event.refNo.toUpperCase().startsWith(prefix)) {
                includeEvent = true;
              }
            }
          }

          if (includeEvent) {
            relevantEvents.push({ ...event, customerStatus: customer.status, customerName: customer.name, customerId: customer.id });
          }
        });
      }
    });

    const totalCases = relevantEvents.length;
    const closedCases = relevantEvents.filter(event => 
      event.customerStatus === 'confirmed' || event.customerStatus === 'finished_event'
    ).length;

    const closingRate = totalCases > 0 ? ((closedCases / totalCases) * 100).toFixed(1) : 0;
    const totalRevenue = relevantEvents.reduce((acc, event) => acc + (event.eventPrice || 0), 0);

    const sourceCounts = relevantEvents.reduce((acc, event) => {
      const source = event.inquirySource || 'other';
      acc[source] = (acc[source] || 0) + 1;
      return acc;
    }, {});

    return { totalCases, closedCases, closingRate, totalRevenue, sourceCounts, relevantEvents };
  }, [customers, startDate, endDate, analysisMode]);

  const handleExport = () => {
    let csvContent = "data:text/csv;charset=utf-8,";
    const headers = ["Customer Name", "Event Date", "Ref No.", "Status", "Inquiry Source", "Inquiry Date", "Event Price"];
    csvContent += headers.join(",") + "\r\n";

    data.relevantEvents.forEach(event => {
      const row = [
        `"${event.customerName}"`,
        event.eventDate,
        `"${event.refNo}"`,
        getStatusLabel(event.customerStatus),
        getInquirySourceLabel(event.inquirySource),
        event.loggedAt?.toDate().toLocaleDateString('en-CA') || 'N/A',
        event.eventPrice || 0
      ].join(",");
      csvContent += row + "\r\n";
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `case_report_${startDate}_to_${endDate}.csv`);
    document.body.appendChild(link); 
    link.click();
    document.body.removeChild(link);
  };

  return (
    <div className="bg-gray-800 p-6 rounded-lg shadow-xl text-white">
      <h2 className="text-2xl font-bold mb-6">Analytics Dashboard</h2>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 p-4 bg-gray-900/50 rounded-lg items-end">
        <div>
          <label htmlFor="startDate" className="block text-sm font-medium text-gray-300 mb-1">Start Date</label>
          <input type="date" id="startDate" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div>
          <label htmlFor="endDate" className="block text-sm font-medium text-gray-300 mb-1">End Date</label>
          <input type="date" id="endDate" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div className="lg:col-span-1">
          <label className="block text-sm font-medium text-gray-300 mb-1">Analysis Mode</label>
          <div className="flex rounded-lg bg-gray-700 p-1">
            <button onClick={() => setAnalysisMode('eventDate')} className={`w-full py-1 px-3 rounded-md text-sm transition ${analysisMode === 'eventDate' ? 'bg-blue-600' : 'hover:bg-gray-600'}`}>By Event Date</button>
            <button onClick={() => setAnalysisMode('inquiryDate')} className={`w-full py-1 px-3 rounded-md text-sm transition ${analysisMode === 'inquiryDate' ? 'bg-blue-600' : 'hover:bg-gray-600'}`}>By Inquiry Date</button>
            <button onClick={() => setAnalysisMode('refNoMonth')} className={`w-full py-1 px-3 rounded-md text-sm transition ${analysisMode === 'refNoMonth' ? 'bg-blue-600' : 'hover:bg-gray-600'}`}>By Ref No.</button>
          </div>
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-300 mb-1 opacity-0">Export</label>
          <button onClick={handleExport} className="w-full flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg"><DownloadIcon /> Export to CSV</button>
        </div>
      </div>
      {analysisMode === 'refNoMonth' && <p className="text-xs text-yellow-400 mb-4 text-center">"By Ref No." mode analyzes cases based on the month prefix (e.g., JN for June) derived from the **Start Date**.</p>}

      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <StatCard title="Total Cases" value={data.totalCases} />
        <StatCard title="Closed Deals" value={data.closedCases} />
        <StatCard title="Closing Rate" value={`${data.closingRate}%`} />
        <StatCard title="Total Revenue" value={`$${data.totalRevenue.toFixed(2)}`} />
      </div>

      <div className="mb-8">
        <h3 className="text-xl font-semibold mb-4">Inquiry Source Analysis</h3>
        <SourceChart data={data.sourceCounts} />
      </div>

      <div>
        <h3 className="text-xl font-semibold mb-4">Cases in Selected Range</h3>
        <CaseList events={data.relevantEvents} navigateTo={navigateTo} />
      </div>
    </div>
  );
}

function StatCard({ title, value }) {
  return (
    <div className="bg-gray-900/50 p-6 rounded-lg text-center">
      <h4 className="text-lg text-gray-400 font-semibold mb-2">{title}</h4>
      <p className="text-4xl font-bold text-blue-400">{value}</p>
    </div>
  );
}

function SourceChart({ data }) {
  const sortedSources = Object.entries(data).sort(([, a], [, b]) => b - a);
  const maxCount = Math.max(...Object.values(data), 0);

  if (sortedSources.length === 0) {
    return <p className="text-gray-400">No data for this time range.</p>;
  }

  return (
    <div className="space-y-4 p-4 bg-gray-900/50 rounded-lg">
      {sortedSources.map(([source, count]) => {
        const sourceLabel = INQUIRY_SOURCE_OPTIONS.find(o => o.value === source)?.label || 'Other';
        const percentage = maxCount > 0 ? (count / maxCount) * 100 : 0;
        return (
          <div key={source} className="flex items-center gap-4">
            <span className="w-32 text-right text-gray-300 truncate">{sourceLabel}</span>
            <div className="flex-1 bg-gray-700 rounded-full h-6">
              <div className="bg-blue-500 h-6 rounded-full flex items-center justify-between px-2 text-sm" style={{ width: `${percentage}%` }}>
                <span>{count}</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function CaseList({ events, navigateTo }) {
  if (events.length === 0) {
    return <p className="text-gray-400 text-center py-4">No cases in the selected range.</p>;
  }
  return (
    <div className="overflow-x-auto bg-gray-900/50 rounded-lg">
      <table className="w-full text-sm text-left text-gray-400">
        <thead className="text-xs text-gray-300 uppercase bg-gray-700/50">
          <tr>
            <th scope="col" className="px-6 py-3">Customer Name</th>
            <th scope="col" className="px-6 py-3">Event Date</th>
            <th scope="col" className="px-6 py-3">Ref No.</th>
            <th scope="col" className="px-6 py-3">Price</th>
            <th scope="col" className="px-6 py-3">Status</th>
          </tr>
        </thead>
        <tbody>
          {events.map((event, index) => (
            <tr key={index} className="bg-gray-800 border-b border-gray-700 hover:bg-gray-700/50">
              <th scope="row" className="px-6 py-4 font-medium text-white whitespace-nowrap">
                <a href="#" onClick={(e) => { e.preventDefault(); navigateTo('detail', event.customerId); }} className="text-blue-400 hover:underline">
                  {event.customerName}
                </a>
              </th>
              <td className="px-6 py-4">{event.eventDate}</td>
              <td className="px-6 py-4">{event.refNo}</td>
              <td className="px-6 py-4">${event.eventPrice?.toFixed ? event.eventPrice.toFixed(2) : Number(event.eventPrice || 0).toFixed(2)}</td>
              <td className="px-6 py-4">
                <span className={`px-2 py-1 text-xs font-bold rounded-full ${STATUS_COLORS[event.customerStatus] || STATUS_COLORS.default}`}>
                  {getStatusLabel(event.customerStatus)}
                </span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>

const safeId = (value) => String(value || 'na').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 80);
const dateToInput = (date) => date ? date.toISOString().slice(0, 10) : '';
const parseDate = (value) => {
  if (!value) return null;
  if (value.toDate) return value.toDate();
  const parsed = new Date(value);
  return Number.isNaN(parsed.getTime()) ? null : parsed;
};
const addDays = (date, days) => {
  if (!date) return null;
  const next = new Date(date);
  next.setDate(next.getDate() + days);
  return next;
};
const startOfToday = () => {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return today;
};
const formatDate = (value) => {
  const date = parseDate(value);
  return date ? date.toLocaleDateString('en-CA') : 'N/A';
};

const inferServices = (event, customer) => {
  const text = [
    event?.eventType,
    event?.serviceContent,
    event?.services,
    event?.notes,
    event?.refNo,
    customer?.name,
  ].filter(Boolean).join(' ').toLowerCase();
  const services = new Set(['General', 'Payment']);
  if (/yacht|boat|sail|遊艇/.test(text)) services.add('Venue/Yacht');
  if (/drink|bar|wine|beer|cocktail|飲/.test(text)) services.add('Drinks');
  if (/food|menu|餐|菜|catering|bbq/.test(text)) services.add('Food');
  if (/staff|waiter|crew|人手|侍應/.test(text)) services.add('Staffing');
  if (!services.has('Food') && !services.has('Drinks') && !services.has('Venue/Yacht')) services.add('Food');
  return Array.from(services);
};

const inferEventType = (event, services) => {
  if (event?.eventType) return event.eventType;
  if (services.includes('Venue/Yacht')) return 'Yacht Event / 遊艇活動';
  return 'Corporate/Party Event / 公司或派對活動';
};

const selectTemplate = (caseItem) => caseItem.services.includes('Venue/Yacht') ? PROJECT_TASK_TEMPLATES.yacht : PROJECT_TASK_TEMPLATES.default;

const buildProjectCases = (customers) => {
  const cases = [];
  customers.forEach(customer => {
    (customer.events || []).forEach((event, eventIndex) => {
      const eventDate = parseDate(event.eventDate);
      if (!eventDate) return;
      const services = inferServices(event, customer);
      const refNo = event.refNo || `${customer.id}-${eventIndex + 1}`;
      const caseId = safeId(`${customer.id}_${eventIndex}_${refNo}`);
      cases.push({
        id: caseId,
        customerId: customer.id,
        customerName: customer.name || 'Unnamed / 未命名',
        phone: customer.phone || '',
        address: customer.address || '',
        customerStatus: customer.status || 'new',
        eventIndex,
        eventDate: dateToInput(eventDate),
        enquiryNo: refNo,
        eventPrice: Number(event.eventPrice || 0),
        inquirySource: event.inquirySource || 'other',
        eventType: inferEventType(event, services),
        services,
      });
    });
  });
  return cases.sort((a, b) => parseDate(a.eventDate) - parseDate(b.eventDate));
};

const buildTemplateTasks = (caseItem) => selectTemplate(caseItem).map(template => {
  const eventDate = parseDate(caseItem.eventDate);
  const dueDate = addDays(eventDate, template.offset);
  const taskDocId = safeId(`${caseItem.id}_${template.id}`);
  return {
    id: taskDocId,
    taskDocId,
    caseId: caseItem.id,
    customerId: caseItem.customerId,
    eventIndex: caseItem.eventIndex,
    enquiryNo: caseItem.enquiryNo,
    templateId: template.id,
    name: template.name,
    serviceType: template.serviceType,
    owner: '',
    plannedStartDate: dateToInput(dueDate),
    plannedDueDate: dateToInput(dueDate),
    relativeDayOffset: template.offset,
    status: template.defaultStatus || 'not_started',
    notes: '',
    isAutoGenerated: true,
    isDateManualOverride: false,
    isStatusManualOverride: false,
  };
});

const mergeTasksForCase = (caseItem, storedTasks) => {
  const storedByTemplate = {};
  storedTasks.filter(task => task.caseId === caseItem.id).forEach(task => { storedByTemplate[task.templateId] = task; });
  return buildTemplateTasks(caseItem).map(templateTask => {
    const stored = storedByTemplate[templateTask.templateId];
    if (!stored) return templateTask;
    const plannedDueDate = stored.isDateManualOverride ? stored.plannedDueDate : templateTask.plannedDueDate;
    const plannedStartDate = stored.isDateManualOverride ? stored.plannedStartDate : templateTask.plannedStartDate;
    return { ...templateTask, ...stored, plannedDueDate, plannedStartDate };
  });
};

const calculateCaseProgress = (caseItem, tasks) => {
  const today = startOfToday();
  const tomorrow = addDays(today, 1);
  const total = tasks.length;
  const done = tasks.filter(task => task.status === 'done').length;
  const incomplete = tasks.filter(task => task.status !== 'done');
  const overdue = incomplete.filter(task => {
    const due = parseDate(task.plannedDueDate);
    return due && due < today;
  });
  const nextTask = incomplete
    .slice()
    .sort((a, b) => (parseDate(a.plannedDueDate)?.getTime() || Infinity) - (parseDate(b.plannedDueDate)?.getTime() || Infinity))[0];
  const nextDue = parseDate(nextTask?.plannedDueDate);
  let riskStatus = 'green';
  if (!parseDate(caseItem.eventDate)) riskStatus = 'gray';
  else if (overdue.length > 0) riskStatus = 'red';
  else if (nextTask?.status === 'waiting_client') riskStatus = 'blue';
  else if (nextDue && nextDue <= tomorrow) riskStatus = 'yellow';
  const eventDate = parseDate(caseItem.eventDate);
  const daysLeft = eventDate ? Math.ceil((eventDate - today) / 86400000) : null;
  return {
    progressPercent: total ? Math.round((done / total) * 100) : 0,
    doneCount: done,
    totalTasks: total,
    overdueCount: overdue.length,
    nextAction: nextTask?.name || 'All tasks done / 全部完成',
    nextDueDate: nextTask?.plannedDueDate || '',
    riskStatus,
    daysLeft,
  };
};

            `"${customer.name || ''}"`,
            `"${customer.phone || ''}"`,
            `"${(customer.address || '').replace(/"/g, '""')}"`,
            `"${getStatusLabel(customer.status)}"`,
            `"${event.eventDate || ''}"`,
            `"${event.refNo || ''}"`,
            `"${getInquirySourceLabel(event.inquirySource)}"`,
            `"${event.loggedAt?.toDate ? event.loggedAt.toDate().toLocaleDateString('en-CA') : ''}"`,
            `${event.eventPrice || 0}`
          ].join(",");
          csvContent += row + "\r\n";
        });
      } else {
        const row = [
          `"${customer.name || ''}"`,
          `"${customer.phone || ''}"`,
          `"${(customer.address || '').replace(/"/g, '""')}"`,
          `"${getStatusLabel(customer.status)}"`,
          "", "", "", "", ""
        ].join(",");
        csvContent += row + "\r\n";
      }
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "full_customer_database.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const renderContent = () => {
    switch (view) {
      case 'loading': return <div className="text-center p-10">Loading...</div>;
      case 'error': return <div className="text-center p-10 text-red-400">{error}</div>;

      case 'dashboard': return <AnalyticsDashboard customers={customers} navigateTo={navigateTo} />;
      case 'list':

              </div>

                <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="w-full appearance-none bg-gray-700 border border-gray-600 rounded-lg py-2 pl-10 pr-8">
                  <option value="all">All Statuses</option>

              <button onClick={handleExportAll} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg"><DownloadIcon /><span>Export All</span></button>
              <button onClick={() => navigateTo('add')} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg"><UserPlusIcon /><span>Add Customer</span></button>
            </div>
            <CustomerList customers={filteredCustomers} onSelectCustomer={(id) => navigateTo('detail', id)} />

        );
    }
  };

  return (
    <div className="bg-gray-900 text-white min-h-screen font-sans">
      <header className="bg-gray-800/50 backdrop-blur-sm shadow-md sticky top-0 z-10">
        <div className="container mx-auto px-4 py-3 flex justify-between items-center">
          <button onClick={() => setView('home')} className="text-2xl font-bold text-left hover:text-blue-300">CRM Operations / 客戶與專案管理</button>
          <div className="flex flex-wrap items-center gap-3 text-sm">

}

async function ensureProjectTasks(db, cases, projectTasks) {
  if (!db || cases.length === 0) return;
  const existingIds = new Set(projectTasks.map(task => task.taskDocId || task.id));
  const writes = [];
  cases.slice(0, 100).forEach(caseItem => {
    buildTemplateTasks(caseItem).forEach(task => {
      if (!existingIds.has(task.taskDocId)) {
        writes.push(setDoc(doc(db, `${PROJECT_TASKS_PATH}/${task.taskDocId}`), {
          ...task,
          createdAt: Timestamp.now(),
          lastUpdatedAt: Timestamp.now(),
        }, { merge: true }));
      }
    });
  });
  await Promise.all(writes);
}

function ProjectBoard({ db, customers, cases, projectTasks, onSelectCase }) {
  const [riskFilter, setRiskFilter] = React.useState('all');
  const [sortMode, setSortMode] = React.useState('risk');
  const [isSyncing, setIsSyncing] = React.useState(false);

  React.useEffect(() => {
    if (!db || cases.length === 0) return;
    const run = async () => {
      setIsSyncing(true);
      try { await ensureProjectTasks(db, cases, projectTasks); }
      catch (err) { console.error("Project task sync failed:", err); }
      finally { setIsSyncing(false); }
    };
    run();
  }, [db, cases.length]);

  const rows = React.useMemo(() => {
    const riskRank = { red: 0, blue: 1, yellow: 2, green: 3, gray: 4 };
    return cases.map(caseItem => {
      const tasks = mergeTasksForCase(caseItem, projectTasks);
      const summary = calculateCaseProgress(caseItem, tasks);
      return { caseItem, tasks, summary };
    }).filter(row => riskFilter === 'all' || row.summary.riskStatus === riskFilter)
      .sort((a, b) => {
        if (sortMode === 'eventDate') return (parseDate(a.caseItem.eventDate)?.getTime() || Infinity) - (parseDate(b.caseItem.eventDate)?.getTime() || Infinity);
        if (sortMode === 'overdue') return b.summary.overdueCount - a.summary.overdueCount;
        if (sortMode === 'progress') return a.summary.progressPercent - b.summary.progressPercent;
        return riskRank[a.summary.riskStatus] - riskRank[b.summary.riskStatus] || (parseDate(a.caseItem.eventDate)?.getTime() || Infinity) - (parseDate(b.caseItem.eventDate)?.getTime() || Infinity);
      });
  }, [cases, projectTasks, riskFilter, sortMode]);

  const boardStats = React.useMemo(() => {
    const allRows = cases.map(caseItem => calculateCaseProgress(caseItem, mergeTasksForCase(caseItem, projectTasks)));
    return {
      total: allRows.length,
      red: allRows.filter(summary => summary.riskStatus === 'red').length,
      yellow: allRows.filter(summary => summary.riskStatus === 'yellow').length,
      blue: allRows.filter(summary => summary.riskStatus === 'blue').length,
      thisWeek: allRows.filter(summary => summary.daysLeft !== null && summary.daysLeft >= 0 && summary.daysLeft <= 7).length,
    };
  }, [cases, projectTasks]);

  return (
    <div className="space-y-6">
      <div className="flex flex-col lg:flex-row lg:items-end justify-between gap-4">
        <div>
          <h2 className="text-3xl font-bold">進度管理 / Project Board</h2>
          <p className="text-gray-400 mt-1">Analytics 已整合在這裡，先看風險，再點進 case 看完整甘特圖。</p>
        </div>
        <div className="flex flex-wrap gap-3">
          <select value={riskFilter} onChange={e => setRiskFilter(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg p-2">
            <option value="all">全部 / All</option>
            <option value="red">逾期 / Overdue</option>
            <option value="yellow">即將到期 / Due Soon</option>
            <option value="blue">等客人 / Waiting Client</option>
            <option value="green">正常 / On Track</option>
          </select>
          <select value={sortMode} onChange={e => setSortMode(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg p-2">
            <option value="risk">最危險 / Risk First</option>
            <option value="eventDate">活動最近 / Event Date</option>
            <option value="overdue">逾期最多 / Overdue Count</option>
            <option value="progress">進度最低 / Lowest Progress</option>
          </select>
          <button onClick={() => ensureProjectTasks(db, cases, projectTasks)} className="bg-blue-600 hover:bg-blue-700 rounded-lg px-4 py-2">同步任務 / Sync Tasks</button>
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <StatPill label="Cases" value={boardStats.total} />
        <StatPill label="逾期 / Red" value={boardStats.red} />
        <StatPill label="即將到期 / Yellow" value={boardStats.yellow} />
        <StatPill label="等客人 / Waiting" value={boardStats.blue} />
        <StatPill label="7日內活動 / This Week" value={boardStats.thisWeek} />
      </div>
      {isSyncing && <p className="text-sm text-blue-300">正在同步時間線任務 / Syncing timeline tasks...</p>}

      <div className="bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
        <div className="grid grid-cols-12 gap-3 px-4 py-3 text-xs uppercase text-gray-400 bg-gray-900/70">
          <div className="col-span-3">Case / 客戶</div>
          <div className="col-span-2">活動日期 / Event</div>
          <div className="col-span-2">進度 / Progress</div>
          <div className="col-span-2">風險 / Risk</div>
          <div className="col-span-3">下一步 / Next Action</div>
        </div>
        {rows.length === 0 ? (
          <p className="p-6 text-gray-400">No project cases yet / 目前沒有可管理的 case。請先建立含 Event Date 的 event。</p>
        ) : rows.map(row => (
          <button key={row.caseItem.id} onClick={() => onSelectCase(row.caseItem.id)} className="w-full text-left grid grid-cols-12 gap-3 px-4 py-4 border-t border-gray-700 hover:bg-gray-700/60 transition">
            <div className="col-span-12 md:col-span-3">
              <div className="font-semibold text-blue-300">{row.caseItem.customerName}</div>
              <div className="text-xs text-gray-400">{row.caseItem.enquiryNo} · {row.caseItem.eventType}</div>
              <div className="text-xs text-gray-500">{row.caseItem.services.join(', ')}</div>
            </div>
            <div className="col-span-4 md:col-span-2">
              <div>{formatDate(row.caseItem.eventDate)}</div>
              <div className="text-xs text-gray-400">{row.summary.daysLeft === null ? 'N/A' : `${row.summary.daysLeft} days left / 剩 ${row.summary.daysLeft} 天`}</div>
            </div>
            <div className="col-span-4 md:col-span-2">
              <ProgressBar value={row.summary.progressPercent} />
              <div className="text-xs text-gray-400 mt-1">{row.summary.doneCount}/{row.summary.totalTasks} tasks</div>
            </div>
            <div className="col-span-4 md:col-span-2">
              <span className={`inline-block px-2 py-1 rounded-full text-xs font-bold ${RISK_COLORS[row.summary.riskStatus]}`}>{RISK_LABELS[row.summary.riskStatus]}</span>
              <div className="text-xs text-gray-400 mt-1">逾期 / Overdue: {row.summary.overdueCount}</div>
            </div>
            <div className="col-span-12 md:col-span-3">
              <div className="text-sm">{row.summary.nextAction}</div>
              <div className="text-xs text-gray-400">截止 / Due: {formatDate(row.summary.nextDueDate)}</div>
              <MiniTimeline tasks={row.tasks} />
            </div>
          </button>
        ))}
      </div>

      <AnalyticsDashboard customers={customers} navigateTo={() => {}} compact />
    </div>
  );
}

function ProjectCaseDetail({ db, caseItem, projectTasks, onBack }) {
  if (!caseItem) return <div className="text-center p-10 text-gray-400">Case not found / 找不到 case。</div>;
  const tasks = mergeTasksForCase(caseItem, projectTasks);
  const summary = calculateCaseProgress(caseItem, tasks);
  const eventDate = parseDate(caseItem.eventDate);
  const timelineStart = addDays(eventDate, -10) || startOfToday();
  const timelineEnd = eventDate || addDays(timelineStart, 10);
  const totalDays = Math.max(1, Math.ceil((timelineEnd - timelineStart) / 86400000));

  const updateTask = async (task, patch) => {
    await setDoc(doc(db, `${PROJECT_TASKS_PATH}/${task.taskDocId}`), {
      ...patch,
      caseId: caseItem.id,
      customerId: caseItem.customerId,
      eventIndex: caseItem.eventIndex,
      enquiryNo: caseItem.enquiryNo,
      templateId: task.templateId,
      lastUpdatedAt: Timestamp.now(),
    }, { merge: true });
  };

  const markDone = async (task) => {
    await updateTask(task, {
      status: 'done',
      isStatusManualOverride: true,
      actualCompletedAt: Timestamp.now(),
    });
  };

  return (
    <div className="max-w-7xl mx-auto space-y-6">
      <div className="flex items-center justify-between gap-4">
        <button onClick={onBack} className="flex items-center gap-2 text-blue-400 hover:text-blue-300"><ArrowLeftIcon /> 返回 / Back</button>
        <span className={`px-3 py-1 rounded-full text-sm font-bold ${RISK_COLORS[summary.riskStatus]}`}>{RISK_LABELS[summary.riskStatus]}</span>
      </div>

      <div className="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <div className="flex flex-col lg:flex-row lg:items-start justify-between gap-5">
          <div>
            <h2 className="text-3xl font-bold text-blue-300">{caseItem.customerName}</h2>
            <p className="text-gray-300 mt-1">{caseItem.eventType} · {caseItem.enquiryNo}</p>
            <p className="text-gray-400 text-sm mt-1">{caseItem.services.join(', ')}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 min-w-full lg:min-w-[560px]">
            <StatPill label="活動日期 / Event Date" value={formatDate(caseItem.eventDate)} />
            <StatPill label="剩餘天數 / Days Left" value={summary.daysLeft ?? 'N/A'} />
            <StatPill label="進度 / Progress" value={`${summary.progressPercent}%`} />
            <StatPill label="逾期 / Overdue" value={summary.overdueCount} />
          </div>
        </div>
      </div>

      <div className="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <h3 className="text-xl font-semibold mb-4">Project Timeline / 甘特圖</h3>
        <div className="overflow-x-auto">
          <div className="min-w-[900px]">
            <div className="grid gap-4 text-xs text-gray-400 mb-2" style={{ gridTemplateColumns: '260px 1fr' }}>
              <div>任務 / Task</div>
              <div className="flex justify-between">
                {[-10, -7, -5, -4, -3, -2, -1, 0].map(offset => <span key={offset}>{offset === 0 ? 'T' : `T${offset}`}</span>)}
              </div>
            </div>
            <div className="space-y-3">
              {tasks.map(task => {
                const due = parseDate(task.plannedDueDate);
                const left = due ? Math.max(0, Math.min(100, ((due - timelineStart) / 86400000 / totalDays) * 100)) : 0;
                const isOverdue = due && due < startOfToday() && task.status !== 'done';
                return (
                  <div key={task.taskDocId} className="grid gap-4 items-center" style={{ gridTemplateColumns: '260px 1fr' }}>
                    <div>
                      <div className="font-medium text-sm">{task.name}</div>
                      <div className="text-xs text-gray-400">{task.serviceType} · Due {formatDate(task.plannedDueDate)}</div>
                    </div>
                    <div className="relative h-8 bg-gray-900 rounded">
                      <div className={`absolute top-2 h-4 rounded ${task.status === 'done' ? 'bg-green-500' : isOverdue ? 'bg-red-500' : task.status === 'waiting_client' ? 'bg-indigo-500' : 'bg-blue-500'}`} style={{ left: `${left}%`, width: '5%' }}></div>
                      {task.actualCompletedAt && <div className="absolute top-0 text-green-300 text-xs" style={{ left: `${left}%` }}>✓</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      <div className="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <h3 className="text-xl font-semibold mb-4">任務清單 / Task Checklist</h3>
        <div className="space-y-3">
          {tasks.map(task => {
            const due = parseDate(task.plannedDueDate);
            const isOverdue = due && due < startOfToday() && task.status !== 'done';
            return (
              <div key={task.taskDocId} className="grid grid-cols-1 lg:grid-cols-12 gap-3 items-center bg-gray-900/60 rounded-lg p-3">
                <div className="lg:col-span-4">
                  <div className="font-medium">{task.name}</div>
                  <div className="text-xs text-gray-400">{task.serviceType} · {isOverdue ? '逾期 / Overdue' : `Due ${formatDate(task.plannedDueDate)}`}</div>
                </div>
                <select value={task.status || 'not_started'} onChange={e => updateTask(task, { status: e.target.value, isStatusManualOverride: true, actualCompletedAt: e.target.value === 'done' ? Timestamp.now() : null })} className="lg:col-span-2 bg-gray-800 border border-gray-700 rounded p-2">
                  {TASK_STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
                </select>
                <input type="date" value={task.plannedDueDate || ''} onChange={e => updateTask(task, { plannedDueDate: e.target.value, plannedStartDate: e.target.value, isDateManualOverride: true })} className="lg:col-span-2 bg-gray-800 border border-gray-700 rounded p-2" />
                <input type="text" value={task.owner || ''} onChange={e => updateTask(task, { owner: e.target.value })} placeholder="負責人 / Owner" className="lg:col-span-2 bg-gray-800 border border-gray-700 rounded p-2" />
                <button onClick={() => markDone(task)} className="lg:col-span-1 bg-green-600 hover:bg-green-700 rounded p-2">Done</button>
                <input type="text" value={task.notes || ''} onChange={e => updateTask(task, { notes: e.target.value })} placeholder="備註 / Notes" className="lg:col-span-12 bg-gray-800 border border-gray-700 rounded p-2" />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const [status, setStatus] = React.useState('new');

  const [inquirySource, setInquirySource] = React.useState('other');
  const [eventPrice, setEventPrice] = React.useState('');
  const [isSaving, setIsSaving] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!name || !phone || isSaving) return;
    setIsSaving(true);
    try {
      const customersCollectionPath = `artifacts/${appId}/public/data/customers`;
      await addDoc(collection(db, customersCollectionPath), {
        name, phone, address, status,
        events: eventDate && refNo ? [{ eventDate, refNo, inquirySource, eventPrice: parseFloat(eventPrice) || 0, loggedAt: Timestamp.now() }] : [],
        createdAt: Timestamp.now()
      });
      onBack();
    } catch (error) {
      console.error("Error adding customer:", error);
      const msg = [
        'Failed to add customer.',
        error?.code ? `code: ${error.code}` : '',
        error?.message ? `message: ${error.message}` : ''
      ].filter(Boolean).join('\n');
      alert(msg);
    } finally { setIsSaving(false); }
  };

  return (
    <div className="max-w-2xl mx-auto bg-gray-800 p-6 rounded-lg shadow-xl">
      <div className="flex items-center mb-6">
        <button onClick={onBack} className="mr-4 p-2 rounded-full hover:bg-gray-700 transition"><ArrowLeftIcon /></button>
        <h2 className="text-2xl font-bold">Add New Customer</h2>
      </div>
      <form onSubmit={handleSubmit} className="space-y-4">
        <div>
          <label htmlFor="name" className="block text-sm font-medium text-gray-300 mb-1">Name</label>
          <input type="text" id="name" value={name} onChange={(e) => setName(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div>
          <label htmlFor="phone" className="block text-sm font-medium text-gray-300 mb-1">Phone</label>
          <input type="tel" id="phone" value={phone} onChange={(e) => setPhone(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div>
          <label htmlFor="address" className="block text-sm font-medium text-gray-300 mb-1">Address</label>
          <input type="text" id="address" value={address} onChange={(e) => setAddress(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div className="p-4 border border-gray-700 rounded-lg space-y-4">
          <p className="text-sm text-gray-400">Optional: Add first event details</p>
          <div>
            <label htmlFor="eventDate" className="block text-sm font-medium text-gray-300 mb-1">Event Date</label>
            <input type="date" id="eventDate" value={eventDate} onChange={(e) => setEventDate(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
          </div>
          <div>
            <label htmlFor="refNo" className="block text-sm font-medium text-gray-300 mb-1">Ref No.</label>
            <input type="text" id="refNo" value={refNo} onChange={(e) => setRefNo(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
          </div>
          <div>
            <label htmlFor="eventPrice" className="block text-sm font-medium text-gray-300 mb-1">Event Price</label>
            <input type="number" id="eventPrice" value={eventPrice} onChange={(e) => setEventPrice(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
          </div>
          <div>
            <label htmlFor="inquirySource" className="block text-sm font-medium text-gray-300 mb-1">Inquiry Source</label>
            <select id="inquirySource" value={inquirySource} onChange={(e) => setInquirySource(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2">
              {INQUIRY_SOURCE_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label htmlFor="status" className="block text-sm font-medium text-gray-300 mb-1">Status</label>
          <select id="status" value={status} onChange={(e) => setStatus(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2">
            {STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}
          </select>
        </div>
        <div className="flex justify-end">
          <button type="submit" disabled={isSaving} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition disabled:bg-gray-500">{isSaving ? 'Saving...' : 'Save Customer'}</button>
        </div>
      </form>
    </div>
  );
}

const normalizePhone = (value) => String(value || '').replace(/\D/g, '');
const splitServices = (value) => String(value || '').split(/[,，\n]/).map(item => item.trim()).filter(Boolean);

const emptyIntakeDraft = () => ({
  name: '',
  phone: '',
  address: '',
  eventDate: '',
  enquiryNo: '',
  eventType: '',
  servicesText: '',
  pax: '',
  paymentStatus: '',
  eventPrice: '',
  notes: '',
  confidence: 0,
  warnings: [],
});

const coerceIntakeDraft = (result) => {
  const customer = result?.customer || {};
  const caseData = result?.case || {};
  return {
    name: customer.name || '',
    phone: customer.phone || '',
    address: customer.address || '',
    eventDate: caseData.eventDate || '',
    enquiryNo: caseData.enquiryNo || '',
    eventType: caseData.eventType || '',
    servicesText: Array.isArray(caseData.services) ? caseData.services.join(', ') : (caseData.services || ''),
    pax: caseData.pax || '',
    paymentStatus: caseData.paymentStatus || '',
    eventPrice: caseData.eventPrice ? String(caseData.eventPrice) : '',
    notes: caseData.notes || '',
    confidence: Number(result?.confidence?.overall || result?.confidence || 0),
    warnings: Array.isArray(result?.warnings) ? result.warnings : [],
  };
};

function ScreenshotIntake({ db, functionsApi, customers, onBack, onCreated }) {
  const [draft, setDraft] = React.useState(emptyIntakeDraft());
  const [imageDataUrl, setImageDataUrl] = React.useState('');
  const [fileMeta, setFileMeta] = React.useState(null);
  const [isAnalyzing, setIsAnalyzing] = React.useState(false);
  const [isSaving, setIsSaving] = React.useState(false);
  const [message, setMessage] = React.useState('');
  const [rawResult, setRawResult] = React.useState(null);

  const duplicateMatches = React.useMemo(() => {
    const phone = normalizePhone(draft.phone);
    const name = draft.name.trim().toLowerCase();
    if (!phone && !name) return [];
    return customers.filter(customer => {
      const customerPhone = normalizePhone(customer.phone);
      const phoneMatch = phone && customerPhone && (customerPhone.includes(phone) || phone.includes(customerPhone));
      const nameMatch = name && String(customer.name || '').trim().toLowerCase() === name;
      return phoneMatch || nameMatch;
    }).slice(0, 5);
  }, [customers, draft.phone, draft.name]);

  const updateDraft = (field, value) => setDraft(prev => ({ ...prev, [field]: value }));

  const handleFileChange = (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      setMessage('Please upload an image file / 請上傳圖片檔');
      return;
    }
    if (file.size > 6 * 1024 * 1024) {
      setMessage('Image is too large. Please keep it under 6MB / 圖片請小於 6MB');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      setImageDataUrl(String(reader.result || ''));
      setFileMeta({ name: file.name, type: file.type, size: file.size });
      setMessage('Image loaded. You can run AI Analyze or fill the draft manually / 圖片已載入，可按 AI 解析或手動填寫');
      setRawResult(null);
    };
    reader.readAsDataURL(file);
  };

  const handleAnalyze = async () => {
    if (!imageDataUrl || !functionsApi || isAnalyzing) return;
    setIsAnalyzing(true);
    setMessage('');
    try {
      const analyzeScreenshotIntake = httpsCallable(functionsApi, 'analyzeScreenshotIntake');
      const response = await analyzeScreenshotIntake({
        imageDataUrl,
        fileName: fileMeta?.name || 'screenshot',
        mimeType: fileMeta?.type || 'image/png',
      });
      const result = response.data || {};
      setRawResult(result);
      setDraft(prev => ({ ...prev, ...coerceIntakeDraft(result) }));
      setMessage('AI draft created. Please review before saving / AI 草稿已建立，請確認後再儲存');
    } catch (error) {
      console.error('Screenshot analysis failed:', error);
      setMessage('AI analyzer is not deployed yet or returned an error. You can still save manually / AI 後端尚未部署或解析失敗，仍可手動建立資料');
    } finally {
      setIsAnalyzing(false);
    }
  };

  const handleSave = async (event) => {
    event.preventDefault();
    if (!draft.name.trim() || isSaving) return;
    setIsSaving(true);
    setMessage('');
    try {
      const services = splitServices(draft.servicesText);
      const eventRecord = {
        eventDate: draft.eventDate || '',
        refNo: draft.enquiryNo || `IMG-${Date.now()}`,
        inquirySource: 'screenshot',
        eventPrice: Number(draft.eventPrice || 0),
        eventType: draft.eventType || '',
        services,
        pax: draft.pax || '',
        paymentStatus: draft.paymentStatus || '',
        notes: draft.notes || '',
        source: 'screenshot',
        loggedAt: Timestamp.now(),
      };
      const customerRef = await addDoc(collection(db, CUSTOMERS_PATH), {
        name: draft.name.trim(),
        phone: draft.phone.trim(),
        address: draft.address.trim(),
        status: 'new',
        intakeStatus: 'unreviewed',
        source: 'screenshot',
        possibleDuplicateIds: duplicateMatches.map(match => match.id),
        events: draft.eventDate ? [eventRecord] : [],
        createdAt: Timestamp.now(),
      });
      await addDoc(collection(db, INTAKE_SUBMISSIONS_PATH), {
        source: 'screenshot',
        status: 'confirmed',
        createdCustomerId: customerRef.id,
        possibleDuplicateIds: duplicateMatches.map(match => match.id),
        extractedDraft: draft,
        rawAiResult: rawResult || null,
        fileMeta: fileMeta || null,
        createdAt: Timestamp.now(),
      });
      onCreated(customerRef.id);
    } catch (error) {
      console.error('Screenshot intake save failed:', error);
      setMessage(`Save failed / 儲存失敗: ${error?.message || error}`);
    } finally {
      setIsSaving(false);
    }
  };

  return (
    <div className="max-w-6xl mx-auto">
      <div className="flex items-center mb-6">
        <button onClick={onBack} className="mr-4 p-2 rounded-full hover:bg-gray-700 transition"><ArrowLeftIcon /></button>
        <div>
          <h2 className="text-3xl font-bold text-purple-300">Screenshot Intake / 截圖匯入</h2>
          <p className="text-gray-400 text-sm">Upload a chat or enquiry screenshot, review the draft, then create a new CRM customer / 上傳對話或詢價截圖，確認草稿後建立新客戶資料</p>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section className="bg-gray-800 border border-gray-700 rounded-lg p-5">
          <h3 className="text-xl font-semibold mb-4">1. Upload image / 上傳圖片</h3>
          <input type="file" accept="image/*" onChange={handleFileChange} className="block w-full text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-purple-600 file:text-white hover:file:bg-purple-700" />
          <div className="mt-4 min-h-64 bg-gray-900 border border-gray-700 rounded-lg flex items-center justify-center overflow-hidden">
            {imageDataUrl ? (
              <img src={imageDataUrl} alt="Uploaded screenshot preview" className="max-h-96 w-full object-contain" />
            ) : (
              <p className="text-gray-500">No screenshot selected / 尚未選擇截圖</p>
            )}
          </div>
          <button type="button" onClick={handleAnalyze} disabled={!imageDataUrl || isAnalyzing} className="mt-4 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">
            {isAnalyzing ? 'Analyzing... / 解析中...' : 'AI Analyze / AI 解析'}
          </button>
          {message && <p className="mt-3 text-sm text-yellow-300 whitespace-pre-line">{message}</p>}
        </section>

        <form onSubmit={handleSave} className="bg-gray-800 border border-gray-700 rounded-lg p-5 space-y-4">
          <h3 className="text-xl font-semibold">2. Review draft / 確認草稿</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <TextInput label="Customer name / 客戶名稱" value={draft.name} onChange={value => updateDraft('name', value)} required />
            <TextInput label="Phone / 電話" value={draft.phone} onChange={value => updateDraft('phone', value)} />
            <TextInput label="Address / 地址" value={draft.address} onChange={value => updateDraft('address', value)} className="sm:col-span-2" />
            <TextInput label="Event date / 活動日期" type="date" value={draft.eventDate} onChange={value => updateDraft('eventDate', value)} />
            <TextInput label="Enquiry No / 詢價編號" value={draft.enquiryNo} onChange={value => updateDraft('enquiryNo', value)} />
            <TextInput label="Event type / 活動類型" value={draft.eventType} onChange={value => updateDraft('eventType', value)} />
            <TextInput label="Services / 服務項目" value={draft.servicesText} onChange={value => updateDraft('servicesText', value)} placeholder="Food, Drinks, Yacht" />
            <TextInput label="Pax / 人數" value={draft.pax} onChange={value => updateDraft('pax', value)} />
            <TextInput label="Payment status / 付款狀態" value={draft.paymentStatus} onChange={value => updateDraft('paymentStatus', value)} />
            <TextInput label="Event price / 活動金額" type="number" value={draft.eventPrice} onChange={value => updateDraft('eventPrice', value)} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-300 mb-1">Notes / 備註</label>
            <textarea value={draft.notes} onChange={event => updateDraft('notes', event.target.value)} rows="4" className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2" />
          </div>

          {duplicateMatches.length > 0 && (
            <div className="bg-yellow-900/40 border border-yellow-700 rounded-lg p-3 text-sm">
              <div className="font-semibold text-yellow-200 mb-2">Possible duplicates / 可能是同一位客戶</div>
              {duplicateMatches.map(match => <div key={match.id} className="text-yellow-100">{match.name || 'Unnamed'} - {match.phone || 'No phone'}</div>)}
              <p className="text-yellow-300 mt-2">This will still create a new customer first. You can merge later / 目前仍會先建立新客戶，之後可再合併</p>
            </div>
          )}

          {draft.confidence > 0 && <p className="text-sm text-gray-400">AI confidence / AI 信心值: {Math.round(draft.confidence * 100)}%</p>}
          {draft.warnings.length > 0 && <p className="text-sm text-yellow-300">Warnings / 注意: {draft.warnings.join('; ')}</p>}

          <button type="submit" disabled={!draft.name.trim() || isSaving} className="w-full bg-purple-600 hover:bg-purple-700 disabled:bg-gray-600 text-white font-bold py-3 px-4 rounded-lg">
            {isSaving ? 'Saving... / 儲存中...' : 'Create New Customer / 建立新客戶'}
          </button>
        </form>
      </div>
    </div>
  );
}

function TextInput({ label, value, onChange, type = 'text', required = false, placeholder = '', className = '' }) {
  return (
    <div className={className}>
      <label className="block text-sm font-medium text-gray-300 mb-1">{label}</label>
      <input type={type} value={value} required={required} placeholder={placeholder} onChange={event => onChange(event.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2" />
    </div>
  );
}

function CustomerDetail({ db, customerId, onBack }) {
  const [customer, setCustomer] = React.useState(null);
  const [logs, setLogs] = React.useState([]);
  const [isLoading, setIsLoading] = React.useState(true);
  const [showNewEventForm, setShowNewEventForm] = React.useState(false);
  const [editingEventIndex, setEditingEventIndex] = React.useState(null);
  const [isEditingInfo, setIsEditingInfo] = React.useState(false);
  const [editableInfo, setEditableInfo] = React.useState({ name: '', phone: '', address: '' });

  const customerDocPath = React.useMemo(() => `artifacts/${appId}/public/data/customers/${customerId}`, [customerId]);

  React.useEffect(() => {
    if (!db) return;
    const unsub = onSnapshot(doc(db, customerDocPath), (docSnap) => {
      const exists = typeof docSnap.exists === 'function' ? docSnap.exists() : docSnap.exists;
      if (exists) {
        const data = { id: docSnap.id, ...docSnap.data() };
        setCustomer(data);
        setEditableInfo({ name: data.name, phone: data.phone, address: data.address || '' });
      } else { setCustomer(null); }
      setIsLoading(false);
    }, (err) => {
      console.error("Error fetching customer details:", err);
      setCustomer(null);
      setIsLoading(false);
    });
    return () => unsub();
  }, [db, customerDocPath]);

  React.useEffect(() => {
    if (!db) return;
    const logsCollectionPath = `${customerDocPath}/logs`;
    const qref = query(collection(db, logsCollectionPath));
    const getLogTime = (log) => log.createdAt?.toDate ? log.createdAt.toDate().getTime() : 0;
    const unsub = onSnapshot(qref, (snapshot) => setLogs(snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => getLogTime(b) - getLogTime(a))), (err) => {
      console.error("Error fetching customer logs:", err);
      setLogs([]);
    });
    return () => unsub();
  }, [db, customerDocPath]);

  const handleInfoChange = (e) => setEditableInfo({ ...editableInfo, [e.target.name]: e.target.value });
  const handleUpdateInfo = async () => {
    if (!editableInfo.name || !editableInfo.phone) return alert("Name and Phone are required.");
    await updateDoc(doc(db, customerDocPath), editableInfo);
    setIsEditingInfo(false);
  };
  const handleStatusChange = async (newStatus) => await updateDoc(doc(db, customerDocPath), { status: newStatus }).catch(err => alert("Failed to update status."));

  if (isLoading) return <div className="text-center p-10">Loading customer details...</div>;
  if (!customer) return <div className="text-center p-10">Customer data not found.</div>;

  const sortedEvents = customer.events ? [...customer.events].sort((a, b) => new Date(b.eventDate) - new Date(a.eventDate)) : [];

  return (
    <div className="max-w-4xl mx-auto">
      <div className="flex items-center mb-6">
        <button onClick={onBack} className="mr-4 p-2 rounded-full hover:bg-gray-700 transition"><ArrowLeftIcon /></button>
        <h2 className="text-3xl font-bold text-blue-400">{isEditingInfo ? editableInfo.name : customer.name}</h2>
      </div>
      <div className="bg-gray-800 p-6 rounded-lg shadow-lg mb-6">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-xl font-semibold">Basic Information</h3>
          {!isEditingInfo ? (
            <button onClick={() => setIsEditingInfo(true)} className="flex items-center gap-2 text-blue-400 hover:text-blue-300"><EditIcon /> Edit</button>
          ) : (
            <div className="flex gap-2">
              <button onClick={() => setIsEditingInfo(false)} className="bg-gray-600 hover:bg-gray-500 text-white font-bold py-1 px-3 rounded-lg">Cancel</button>
              <button onClick={handleUpdateInfo} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded-lg">Save</button>
            </div>
          )}
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-gray-300">
          {isEditingInfo ? (
            <>
              <div className="flex items-center gap-3"><UserIcon /><input type="text" name="name" value={editableInfo.name} onChange={handleInfoChange} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
              <div className="flex items-center gap-3"><PhoneIcon /><input type="text" name="phone" value={editableInfo.phone} onChange={handleInfoChange} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
              <div className="sm:col-span-2 flex items-center gap-3"><HomeIcon /><input type="text" name="address" value={editableInfo.address} onChange={handleInfoChange} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
            </>
          ) : (
            <>
              <p className="flex items-center gap-3"><PhoneIcon /> <span>{customer.phone}</span></p>
              <p className="flex items-center gap-3"><HomeIcon /> <span>{customer.address || 'No address provided'}</span></p>
            </>
          )}
          <p className="flex items-center gap-3"><CalendarIcon /> <span>Member Since: {customer.createdAt?.toDate ? customer.createdAt.toDate().toLocaleDateString() : ''}</span></p>
          <div className="sm:col-span-2 flex items-center gap-3"><TagIcon /><select value={customer.status || 'new'} onChange={(e) => handleStatusChange(e.target.value)} className="bg-gray-700 border border-gray-600 rounded-lg p-2 w-full">{STATUS_OPTIONS.map(option => <option key={option.value} value={option.value}>{option.label}</option>)}</select></div>
        </div>
      </div>
      <div className="bg-gray-800 p-6 rounded-lg shadow-lg mb-6">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-xl font-semibold">Event History</h3>
          <button onClick={() => setShowNewEventForm(!showNewEventForm)} className="flex items-center gap-2 text-blue-400 hover:text-blue-300"><PlusCircleIcon /> {showNewEventForm ? 'Cancel' : 'Log New Event'}</button>
        </div>
        {showNewEventForm && <EventForm db={db} customerDocPath={customerDocPath} onComplete={() => setShowNewEventForm(false)} />}
        <div className="space-y-4 mt-4">
          {sortedEvents.map((event, index) => (
            <div key={index}>
              {editingEventIndex === index ? (
                <EventForm db={db} customer={customer} event={event} eventIndex={index} customerDocPath={customerDocPath} onComplete={() => setEditingEventIndex(null)} />
              ) : (
                <div className="p-3 bg-gray-900/50 rounded-lg">
                  <div className="flex justify-between items-start">
                    <div className="flex-grow">
                      <span className="font-semibold text-white">{event.refNo} - ${event.eventPrice?.toFixed ? event.eventPrice.toFixed(2) : Number(event.eventPrice || 0).toFixed(2)}</span>
                      <div className="text-sm text-gray-400">
                        <span>Event: {event.eventDate}</span>
                        <span className="mx-2">|</span>
                        <span>Inquiry: {event.loggedAt?.toDate ? event.loggedAt.toDate().toLocaleDateString('en-CA') : ''}</span>
                        <span className="mx-2">|</span>
                        <span>Source: {getInquirySourceLabel(event.inquirySource)}</span>
                      </div>
                    </div>
                    <button onClick={() => setEditingEventIndex(index)} className="text-blue-400 hover:text-blue-300 text-sm flex items-center gap-1"><EditIcon/> Edit</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      <LogEntryForm db={db} customerDocPath={customerDocPath} />
      <HistoryList logs={logs} />
    </div>
  );
}

function EventForm({ db, customer, event, eventIndex, customerDocPath, onComplete }) {
  const isEditing = event !== undefined;
  const [eventDate, setEventDate] = React.useState(isEditing ? event.eventDate : '');
  const [refNo, setRefNo] = React.useState(isEditing ? event.refNo : '');
  const [inquirySource, setInquirySource] = React.useState(isEditing ? event.inquirySource || 'other' : 'other');
  const [eventPrice, setEventPrice] = React.useState(isEditing ? event.eventPrice || '' : '');
  const [isSaving, setIsSaving] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!eventDate || !refNo || isSaving) return;
    setIsSaving(true);
    const eventData = { eventDate, refNo, inquirySource, eventPrice: parseFloat(eventPrice) || 0, loggedAt: isEditing ? event.loggedAt : Timestamp.now() };
    try {
      if (isEditing) {
        const updatedEvents = [...customer.events];
        updatedEvents[eventIndex] = eventData;
        await updateDoc(doc(db, customerDocPath), { events: updatedEvents });
      } else {
        await updateDoc(doc(db, customerDocPath), { events: arrayUnion(eventData) });
      }
      onComplete();
    } catch (error) {
      console.error("Error saving event:", error);
      alert("Failed to save event.");
    } finally { setIsSaving(false); }
  };

  return (
    <form onSubmit={handleSubmit} className="p-4 bg-gray-900/50 rounded-lg space-y-4 border border-blue-500/50">
      <h4 className="font-bold text-lg">{isEditing ? 'Edit Event' : 'Log New Event'}</h4>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">{isEditing ? 'Event Date' : 'New Event Date'}</label><input type="date" value={eventDate} onChange={e => setEventDate(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">{isEditing ? 'Ref No.' : 'New Ref No.'}</label><input type="text" value={refNo} onChange={e => setRefNo(e.target.value)} required className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">Event Price</label><input type="number" step="0.01" value={eventPrice} onChange={e => setEventPrice(e.target.value)} placeholder="0.00" className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/></div>
      <div><label className="block text-sm font-medium text-gray-300 mb-1">Inquiry Source</label><select value={inquirySource} onChange={e => setInquirySource(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2">{INQUIRY_SOURCE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
      <div className="flex justify-end gap-2"><button type="button" onClick={onComplete} className="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg">Cancel</button><button type="submit" disabled={isSaving} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg disabled:bg-gray-500">{isSaving ? 'Saving...' : 'Save Event'}</button></div>
    </form>
  );
}

function LogEntryForm({ db, customerDocPath }) {
  const [notes, setNotes] = React.useState('');
  const [menu, setMenu] = React.useState('');
  const handleAddLog = async (e) => {
    e.preventDefault();
    if (!notes.trim() && !menu.trim()) return;
    try {
      await addDoc(collection(db, `${customerDocPath}/logs`), { notes, menu, createdAt: Timestamp.now() });
      setNotes('');
      setMenu('');
    } catch (error) {
      console.error("Error adding log:", error);
      alert('Failed to add log.');
    }
  };
  return (
    <div className="bg-gray-800 p-6 rounded-lg shadow-lg mb-8">
      <h3 className="text-xl font-semibold mb-4">Add Interaction Log / Order</h3>
      <form onSubmit={handleAddLog} className="space-y-4">
        <div><label htmlFor="notes" className="block text-sm font-medium text-gray-300 mb-1">Interaction Notes</label><textarea id="notes" rows="4" value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Record conversation details..." className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"></textarea></div>
        <div><label htmlFor="menu" className="block text-sm font-medium text-gray-300 mb-1">Menu / Order Record</label><textarea id="menu" rows="3" value={menu} onChange={(e) => setMenu(e.target.value)} placeholder="Record items ordered..." className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"></textarea></div>
        <div className="text-right"><button type="submit" className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg">Add Log</button></div>
      </form>
    </div>
  );
}

function HistoryList({ logs }) {
  return (
    <div>
      <h3 className="text-2xl font-semibold mb-4">Interaction History</h3>
      <div className="space-y-6">
        {logs.length > 0 ? logs.map(log => (
          <div key={log.id} className="bg-gray-800 rounded-lg p-5 shadow-md border-l-4 border-blue-500">
            <p className="text-sm text-gray-400 mb-3 font-semibold flex items-center gap-2"><CalendarIcon /> {log.createdAt?.toDate ? log.createdAt.toDate().toLocaleString('en-US') : ''}</p>
            {log.notes && (<div className="mb-4"><h4 className="font-bold text-gray-200 mb-1">Notes:</h4><p className="text-gray-300 whitespace-pre-wrap">{log.notes}</p></div>)}
            {log.menu && (<div><h4 className="font-bold text-gray-200 mb-1 flex items-center gap-2"><BookOpenIcon /> Menu/Order:</h4><p className="text-gray-300 whitespace-pre-wrap bg-gray-700/50 p-3 rounded">{log.menu}</p></div>)}
          </div>
        )) : <p className="text-center text-gray-400 py-6">No interaction logs yet.</p>}
      </div>
    </div>
  );
}

function AnalyticsDashboard({ customers, navigateTo }) {
  const today = new Date();
  const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
  const [startDate, setStartDate] = React.useState(firstDayOfMonth);
  const [endDate, setEndDate] = React.useState(today.toISOString().split('T')[0]);
  const [analysisMode, setAnalysisMode] = React.useState('eventDate'); 

  const data = React.useMemo(() => {
    const start = new Date(startDate);
    const end = new Date(endDate);
    end.setHours(23, 59, 59, 999); 

    const monthRefNoMap = {
      0: 'J', 1: 'F', 2: 'M', 3: 'AL', 4: 'MY', 5: 'JN', 
      6: 'JY', 7: 'A', 8: 'S', 9: 'O', 10: 'N', 11: 'D'
    };

    const relevantEvents = [];
    customers.forEach(customer => {
      if (customer.events) {
        customer.events.forEach(event => {
          let includeEvent = false;
          if (analysisMode === 'eventDate') {
            const eventDate = new Date(event.eventDate);
            if (eventDate >= start && eventDate <= end) {
              includeEvent = true;
            }
          } else if (analysisMode === 'inquiryDate') {
            const loggedAtDate = event.loggedAt?.toDate ? event.loggedAt.toDate() : null;
            if (loggedAtDate && loggedAtDate >= start && loggedAtDate <= end) {
              includeEvent = true;
            }
          } else if (analysisMode === 'refNoMonth') {
            if (event.refNo) {
              const startMonth = start.getMonth();
              const prefix = monthRefNoMap[startMonth];
              if (event.refNo.toUpperCase().startsWith(prefix)) {
                includeEvent = true;
              }
            }
          }

          if (includeEvent) {
            relevantEvents.push({ ...event, customerStatus: customer.status, customerName: customer.name, customerId: customer.id });
          }
        });
      }
    });

    const totalCases = relevantEvents.length;
    const closedCases = relevantEvents.filter(event => 
      event.customerStatus === 'confirmed' || event.customerStatus === 'finished_event'
    ).length;

    const closingRate = totalCases > 0 ? ((closedCases / totalCases) * 100).toFixed(1) : 0;
    const totalRevenue = relevantEvents.reduce((acc, event) => acc + (event.eventPrice || 0), 0);

    const sourceCounts = relevantEvents.reduce((acc, event) => {
      const source = event.inquirySource || 'other';
      acc[source] = (acc[source] || 0) + 1;
      return acc;
    }, {});

    return { totalCases, closedCases, closingRate, totalRevenue, sourceCounts, relevantEvents };
  }, [customers, startDate, endDate, analysisMode]);

  const handleExport = () => {
    let csvContent = "data:text/csv;charset=utf-8,";
    const headers = ["Customer Name", "Event Date", "Ref No.", "Status", "Inquiry Source", "Inquiry Date", "Event Price"];
    csvContent += headers.join(",") + "\r\n";

    data.relevantEvents.forEach(event => {
      const row = [
        `"${event.customerName}"`,
        event.eventDate,
        `"${event.refNo}"`,
        getStatusLabel(event.customerStatus),
        getInquirySourceLabel(event.inquirySource),
        event.loggedAt?.toDate().toLocaleDateString('en-CA') || 'N/A',
        event.eventPrice || 0
      ].join(",");
      csvContent += row + "\r\n";
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `case_report_${startDate}_to_${endDate}.csv`);
    document.body.appendChild(link); 
    link.click();
    document.body.removeChild(link);
  };

  return (
    <div className="bg-gray-800 p-6 rounded-lg shadow-xl text-white">
      <h2 className="text-2xl font-bold mb-6">Analytics Dashboard</h2>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 p-4 bg-gray-900/50 rounded-lg items-end">
        <div>
          <label htmlFor="startDate" className="block text-sm font-medium text-gray-300 mb-1">Start Date</label>
          <input type="date" id="startDate" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div>
          <label htmlFor="endDate" className="block text-sm font-medium text-gray-300 mb-1">End Date</label>
          <input type="date" id="endDate" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-lg p-2"/>
        </div>
        <div className="lg:col-span-1">
          <label className="block text-sm font-medium text-gray-300 mb-1">Analysis Mode</label>
          <div className="flex rounded-lg bg-gray-700 p-1">
            <button onClick={() => setAnalysisMode('eventDate')} className={`w-full py-1 px-3 rounded-md text-sm transition ${analysisMode === 'eventDate' ? 'bg-blue-600' : 'hover:bg-gray-600'}`}>By Event Date</button>
            <button onClick={() => setAnalysisMode('inquiryDate')} className={`w-full py-1 px-3 rounded-md text-sm transition ${analysisMode === 'inquiryDate' ? 'bg-blue-600' : 'hover:bg-gray-600'}`}>By Inquiry Date</button>
            <button onClick={() => setAnalysisMode('refNoMonth')} className={`w-full py-1 px-3 rounded-md text-sm transition ${analysisMode === 'refNoMonth' ? 'bg-blue-600' : 'hover:bg-gray-600'}`}>By Ref No.</button>
          </div>
        </div>
        <div>
          <label className="block text-sm font-medium text-gray-300 mb-1 opacity-0">Export</label>
          <button onClick={handleExport} className="w-full flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg"><DownloadIcon /> Export to CSV</button>
        </div>
      </div>
      {analysisMode === 'refNoMonth' && <p className="text-xs text-yellow-400 mb-4 text-center">"By Ref No." mode analyzes cases based on the month prefix (e.g., JN for June) derived from the **Start Date**.</p>}

      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <StatCard title="Total Cases" value={data.totalCases} />
        <StatCard title="Closed Deals" value={data.closedCases} />
        <StatCard title="Closing Rate" value={`${data.closingRate}%`} />
        <StatCard title="Total Revenue" value={`$${data.totalRevenue.toFixed(2)}`} />
      </div>

      <div className="mb-8">
        <h3 className="text-xl font-semibold mb-4">Inquiry Source Analysis</h3>
        <SourceChart data={data.sourceCounts} />
      </div>

      <div>
        <h3 className="text-xl font-semibold mb-4">Cases in Selected Range</h3>
        <CaseList events={data.relevantEvents} navigateTo={navigateTo} />
      </div>
    </div>
  );
}

function StatCard({ title, value }) {
  return (
    <div className="bg-gray-900/50 p-6 rounded-lg text-center">
      <h4 className="text-lg text-gray-400 font-semibold mb-2">{title}</h4>
      <p className="text-4xl font-bold text-blue-400">{value}</p>
    </div>
  );
}

function SourceChart({ data }) {
  const sortedSources = Object.entries(data).sort(([, a], [, b]) => b - a);
  const maxCount = Math.max(...Object.values(data), 0);

  if (sortedSources.length === 0) {
    return <p className="text-gray-400">No data for this time range.</p>;
  }

  return (
    <div className="space-y-4 p-4 bg-gray-900/50 rounded-lg">
      {sortedSources.map(([source, count]) => {
        const sourceLabel = INQUIRY_SOURCE_OPTIONS.find(o => o.value === source)?.label || 'Other';
        const percentage = maxCount > 0 ? (count / maxCount) * 100 : 0;
        return (
          <div key={source} className="flex items-center gap-4">
            <span className="w-32 text-right text-gray-300 truncate">{sourceLabel}</span>
            <div className="flex-1 bg-gray-700 rounded-full h-6">
              <div className="bg-blue-500 h-6 rounded-full flex items-center justify-between px-2 text-sm" style={{ width: `${percentage}%` }}>
                <span>{count}</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function CaseList({ events, navigateTo }) {
  if (events.length === 0) {
    return <p className="text-gray-400 text-center py-4">No cases in the selected range.</p>;
  }
  return (
    <div className="overflow-x-auto bg-gray-900/50 rounded-lg">
      <table className="w-full text-sm text-left text-gray-400">
        <thead className="text-xs text-gray-300 uppercase bg-gray-700/50">
          <tr>
            <th scope="col" className="px-6 py-3">Customer Name</th>
            <th scope="col" className="px-6 py-3">Event Date</th>
            <th scope="col" className="px-6 py-3">Ref No.</th>
            <th scope="col" className="px-6 py-3">Price</th>
            <th scope="col" className="px-6 py-3">Status</th>
          </tr>
        </thead>
        <tbody>
          {events.map((event, index) => (
            <tr key={index} className="bg-gray-800 border-b border-gray-700 hover:bg-gray-700/50">
              <th scope="row" className="px-6 py-4 font-medium text-white whitespace-nowrap">
                <a href="#" onClick={(e) => { e.preventDefault(); navigateTo('detail', event.customerId); }} className="text-blue-400 hover:underline">
                  {event.customerName}
                </a>
              </th>
              <td className="px-6 py-4">{event.eventDate}</td>
              <td className="px-6 py-4">{event.refNo}</td>
              <td className="px-6 py-4">${event.eventPrice?.toFixed ? event.eventPrice.toFixed(2) : Number(event.eventPrice || 0).toFixed(2)}</td>
              <td className="px-6 py-4">
                <span className={`px-2 py-1 text-xs font-bold rounded-full ${STATUS_COLORS[event.customerStatus] || STATUS_COLORS.default}`}>
                  {getStatusLabel(event.customerStatus)}
                </span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
